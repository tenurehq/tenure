name: Publish OpenClaw Plugin

permissions:
  id-token: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no publish)"
        type: boolean
        default: false

jobs:
  publish:
    name: Build and publish @tenureai/openclaw-plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/openclaw

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist exists
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "dist/index.d.ts missing" && exit 1)

      - name: Verify openclaw.plugin.json
        run: |
          test -f openclaw.plugin.json || (echo "openclaw.plugin.json missing" && exit 1)
          node -e "JSON.parse(require('fs').readFileSync('openclaw.plugin.json','utf8'))" \
            || (echo "openclaw.plugin.json is not valid JSON" && exit 1)

      - name: Verify SKILL.md ships in package
        run: |
          test -f skills/tenure/SKILL.md || (echo "skills/tenure/SKILL.md missing" && exit 1)

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${{ github.ref_name }}"
            echo "value=${VERSION#v}" >> "$GITHUB_OUTPUT"
          else
            # For manual runs, fall back to the version already in package.json
            echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync version from tag
        if: github.event_name == 'push'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public --provenance

      - name: Dry run publish (npm)
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run --access public

      - name: Install ClaWHub CLI
        run: npm install -g clawhub

      - name: Publish to ClaWHub
        if: ${{ !inputs.dry_run }}
        run: |
          clawhub package publish "jeffreyflynt/tenure@main" \
            --clawscan-note "Injects agent-scope headers for multi-agent isolation and forwards requests to a user-run localhost Tenure proxy (port 5757). No data leaves localhost except to the user's configured Anthropic or OpenAI endpoint." \
            --source-repo https://github.com/jeffreyflynt/tenure \
            --source-commit $(git rev-parse HEAD) \
            --version ${{ steps.version.outputs.value }} \
            --owner @tenureai \
            --name tenure \
            --family code-plugin \
            --source-path integrations/openclaw
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Dry run publish (ClaWHub)
        if: ${{ inputs.dry_run }}
        run: |
          clawhub package publish "jeffreyflynt/tenure@main" \
            --clawscan-note "Injects agent-scope headers for multi-agent isolation and forwards requests to a user-run localhost Tenure proxy (port 5757). No data leaves localhost except to the user's configured Anthropic or OpenAI endpoint." \
            --source-repo https://github.com/jeffreyflynt/tenure \
            --source-commit $(git rev-parse HEAD) \
            --version ${{ steps.version.outputs.value }} \
            --owner @tenureai \
            --name tenure \
            --family code-plugin \
            --source-path integrations/openclaw \
            --dry-run
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
